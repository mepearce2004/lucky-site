<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Lucky Website</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>

<body class="about">

    <div class="paw-tab">
        <a href="lucky.html" class="paw-text">Follow Me!</a>
    </div>

    <img src="images/babylucky.png" class="lucky-photo">

    <div class="memory-box">

        <p class="desc">
            Inspired by my childhood pup, Lucky— professional napper, very opinionated barker, and my best friend.
        </p>

        <p class="meaning">
            <span class="milky-title">“Lucky in Memory”</span> came from thinking about how people and pets can still feel close to us through memory.
        </p>

    </div>

    <!-- custom cursor -->
    <div id="custom-cursor">☘️</div>

    <script>
    const cursor = document.getElementById("custom-cursor");

    document.addEventListener("mousemove", (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });
    </script>

</body>
</html>
