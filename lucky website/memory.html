<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Lucky Website</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">

  <!-- p5 library -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
</head>

<body class="memory">

  <div id="custom-cursor">☘️</div>

  <script>
    const cursor = document.getElementById("custom-cursor");

    document.addEventListener("mousemove", (e) => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";
    });
  </script>

  <a href="index.html" class="memory-bone">
    <img src="images/bonebutton.png" alt="continue bone">
    <span class="tag-text">continue</span>
  </a>

  <!-- your p5 sketch -->
  <script src="sketch-memory.js"></script>

</body>

</html>
